version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aviai-backend
    ports:
      - "8000:8000"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      OLLAMA_MODEL_URL: http://host.docker.internal:11434
      OLLAMA_MODEL_NAME: gemma3
      RECORDING_DB_URL: /recordings
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/agent/conversation:/app/src/agent/conversation
      - ./recordings:/recordings
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:16-alpine
    container_name: aviai-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
